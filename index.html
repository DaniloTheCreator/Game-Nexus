<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Games Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0d0d1a;
  --surface: #111120;
  --card: #13131f;
  --border: #1e1e35;
  --border2: #2a2a45;
  --accent: #00d4ff;
  --accent2: #ff3d6e;
  --accent3: #7fff5f;
  --gold: #ffc542;
  --text: #f0f0ff;
  --text2: #9090b0;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-grid {
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

.bg-glow1 {
  position: fixed; top: -250px; left: -150px; width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
  animation: dA 22s ease-in-out infinite alternate;
}

.bg-glow2 {
  position: fixed; bottom: -200px; right: -100px; width: 550px; height: 550px;
  background: radial-gradient(circle, rgba(255,61,110,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
  animation: dB 19s ease-in-out infinite alternate;
}

@keyframes dA { to { transform: translate(70px, 50px); } }
@keyframes dB { to { transform: translate(-50px, -70px); } }

/* HEADER */
header {
  position: relative; z-index: 10;
}

.header-banner {
  background: linear-gradient(180deg, #0c0c1c 0%, #080810 100%);
  border-bottom: 1px solid var(--border2);
  padding: 64px 40px 52px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.header-banner::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 35%, var(--accent2) 65%, transparent 100%);
}

.header-banner::after {
  content: 'Games Nexus';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(6rem, 20vw, 18rem);
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.015);
  pointer-events: none;
  white-space: nowrap;
  z-index: 0;
}

.header-inner { position: relative; z-index: 1; }

.logo-eyebrow {
  font-size: 0.68rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.logo-eyebrow::before, .logo-eyebrow::after {
  content: '';
  display: block;
  width: 30px; height: 1px;
  background: var(--accent);
  opacity: 0.5;
}

.logo-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 9vw, 8rem);
  line-height: 0.88;
  letter-spacing: 0.06em;
  background: linear-gradient(160deg, #ffffff 0%, #c8c8ff 45%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 50px rgba(0,212,255,0.25));
}

.logo-sub {
  margin-top: 14px;
  font-size: 0.88rem;
  color: var(--text2);
  font-weight: 300;
  letter-spacing: 0.06em;
}

.header-stats {
  display: flex;
  justify-content: center;
  gap: 0;
  margin-top: 36px;
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: hidden;
  display: inline-flex;
}

.stat {
  padding: 14px 32px;
  border-right: 1px solid var(--border2);
  text-align: center;
}

.stat:last-child { border-right: none; }

.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  color: var(--accent);
  letter-spacing: 0.05em;
  line-height: 1;
}

.stat-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text2);
  margin-top: 3px;
  font-weight: 500;
}

/* SEARCH */
.search-bar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,8,16,0.94);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.search-icon { color: var(--accent); flex-shrink: 0; }

.search-input {
  flex: 1;
  background: none; border: none; outline: none;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  caret-color: var(--accent);
}

.search-input::placeholder { color: var(--text2); opacity: 0.4; }

.search-count {
  font-size: 0.72rem;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
  min-width: 60px;
  text-align: center;
  transition: opacity 0.2s;
}

.filter-pills {
  display: flex; gap: 8px;
  padding: 10px 40px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}

.filter-pills::-webkit-scrollbar { display: none; }

.pill {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.05); }
.pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

/* MAIN */
main {
  position: relative; z-index: 5;
  max-width: 1400px;
  margin: 0 auto;
  padding: 48px 32px 100px;
}

/* SECTION HEADER */
.section-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px; margin-top: 56px;
}

.section-header:first-child { margin-top: 0; }

.section-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.14em;
  color: var(--text2);
  white-space: nowrap;
}

.section-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(0,212,255,0.4);
  flex-shrink: 0;
}

/* GRID */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 18px;
}

/* CARD */
.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.28s cubic-bezier(.2,.8,.3,1), border-color 0.25s, box-shadow 0.25s;
  position: relative;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

.game-card:hover {
  transform: translateY(-7px) scale(1.015);
  border-color: var(--accent);
  box-shadow: 0 16px 48px rgba(0,212,255,0.2), 0 0 0 1px rgba(0,212,255,0.08), inset 0 0 0 1px rgba(0,212,255,0.04);
}

.card-img-wrap {
  position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden;
}

.card-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.4s ease;
}

.game-card:hover .card-img-wrap img { transform: scale(1.07); }

.card-img-fallback {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; font-size: 3rem;
}

.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(8,8,16,0.9) 0%, transparent 60%);
}

.card-shine {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.25s;
}

.game-card:hover .card-shine { opacity: 1; }

.card-body { padding: 14px 16px 16px; }

.card-name {
  font-weight: 700; font-size: 0.92rem;
  line-height: 1.3; color: var(--text); margin-bottom: 5px;
}

.card-sub {
  font-size: 0.73rem; color: var(--text2);
  line-height: 1.4; margin-bottom: 12px;
}

.card-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}

.card-cta {
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--accent); display: flex; align-items: center; gap: 5px;
  transition: gap 0.2s;
}

.game-card:hover .card-cta { gap: 9px; }

.card-badge {
  font-size: 0.6rem; font-weight: 700;
  padding: 2px 8px; border-radius: 100px;
  letter-spacing: 0.07em; text-transform: uppercase; flex-shrink: 0;
}

.badge-collection { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.22); }
.badge-dlc        { background: rgba(255,197,66,0.1); color: var(--gold);  border: 1px solid rgba(255,197,66,0.22); }
.badge-combo      { background: rgba(255,61,110,0.12); color: var(--accent2); border: 1px solid rgba(255,61,110,0.25); }

.card-combo { grid-column: span 2; }
@media (max-width: 520px) { .card-combo { grid-column: span 1; } }

/* MODAL */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(14px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}

.backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 22px;
  width: 100%; max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
  transform: translateY(24px) scale(0.97);
  transition: transform 0.3s cubic-bezier(.2,.8,.3,1);
  box-shadow: 0 50px 120px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.04), 0 0 80px rgba(0,212,255,0.06);
  position: relative;
}

.backdrop.open .modal { transform: translateY(0) scale(1); }

.modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 22px 22px 0 0;
  z-index: 1;
}

.modal-hero {
  position: relative; width: 100%; aspect-ratio: 16/7; overflow: hidden;
}

.modal-hero img { width: 100%; height: 100%; object-fit: cover; }

.modal-hero-fallback {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem;
}

.modal-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, var(--bg2) 0%, rgba(0,0,0,0.2) 100%);
}

.modal-close {
  position: absolute; top: 14px; right: 14px;
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; z-index: 10;
  transition: background 0.2s;
}

.modal-close:hover { background: rgba(255,61,110,0.55); }

.modal-content { padding: 24px 28px 32px; }

.modal-eyebrow {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; letter-spacing: 0.04em; line-height: 1.05;
  color: var(--text); margin-bottom: 4px;
}

.modal-desc {
  font-size: 0.83rem; color: var(--text2);
  margin-bottom: 20px; line-height: 1.5;
}

.games-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 0;
  margin-bottom: 20px;
  max-height: 240px; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.games-list-header {
  padding: 10px 16px 9px;
  font-size: 0.63rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text2); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 1;
  display: flex; align-items: center; gap: 8px;
}

.games-list-header span {
  background: var(--accent); color: #000;
  border-radius: 100px; padding: 1px 7px;
  font-size: 0.62rem; font-weight: 700;
}

.games-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; border-bottom: 1px solid var(--border);
  font-size: 0.83rem; color: var(--text); transition: background 0.15s;
}

.games-list-item:last-child { border-bottom: none; }
.games-list-item:hover { background: rgba(0,212,255,0.04); }

.games-list-item::before {
  content: '';
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent); opacity: 0.5; flex-shrink: 0;
}

.cred-section-title {
  font-size: 0.63rem; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text2);
  margin-bottom: 10px; margin-top: 2px;
}

.cred-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; margin-bottom: 10px;
}

.cred-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
}

.cred-row:last-child { border-bottom: none; }

.cred-label {
  width: 82px; flex-shrink: 0;
  display: flex; align-items: center;
  padding: 13px 14px;
  font-size: 0.64rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text2); background: rgba(255,255,255,0.02);
  border-right: 1px solid var(--border);
}

.cred-val {
  flex: 1; display: flex; align-items: center;
  padding: 13px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: var(--text);
  word-break: break-all; line-height: 1.4;
}

.cred-copy {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  width: 44px; border-left: 1px solid var(--border);
  background: none; border-top: none; border-right: none; border-bottom: none;
  cursor: pointer; color: var(--text2); transition: all 0.2s;
}

.cred-copy:hover { background: rgba(0,212,255,0.08); color: var(--accent); }
.cred-copy.ok { background: rgba(127,255,95,0.1); color: var(--accent3); }

.modal-note {
  background: rgba(255,197,66,0.05);
  border: 1px solid rgba(255,197,66,0.2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 0.8rem; color: var(--gold); line-height: 1.6;
  margin-top: 12px;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: 70px 20px;
  color: var(--text2); font-size: 0.9rem;
}

.empty-state .ei { font-size: 2.8rem; margin-bottom: 12px; }

@media (max-width: 768px) {
  .header-banner { padding: 44px 20px 40px; }
  main { padding: 32px 16px 80px; }
  .search-bar, .filter-pills { padding-left: 16px; padding-right: 16px; }
  .games-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .modal-content { padding: 18px 18px 28px; }
  .header-stats { flex-direction: column; }
  .stat { border-right: none; border-bottom: 1px solid var(--border2); padding: 10px 24px; }
  .stat:last-child { border-bottom: none; }
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

// ——— STATE ———
let filter = 'all';
let query  = '';

function allItems() {
  return DATA.flatMap(g => g.items.map(i => ({...i, group: g.group})));
}

// ——— RENDER ———
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let total = 0;

  for (const group of DATA) {
    if (filter !== 'all' && group.group !== filter) continue;

    const items = group.items.filter(item => {
      if (!query) return true;
      const q = query.toLowerCase();
      if (item.name.toLowerCase().includes(q)) return true;
      if (item.sub && item.sub.toLowerCase().includes(q)) return true;
      if (item.games && item.games.some(g => g.toLowerCase().includes(q))) return true;
      return false;
    });

    if (items.length === 0) continue;
    total += items.length;

    // Section header
    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.innerHTML = `<div class="section-dot"></div><div class="section-title">${group.groupName}</div><div class="section-line"></div>`;
    main.appendChild(sh);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'games-grid';
    items.forEach((item, i) => {
      const card = buildCard({...item, group: group.group}, i);
      grid.appendChild(card);
    });
    main.appendChild(grid);
  }

  document.getElementById('totalCards').textContent = allItems().length;

  const sc = document.getElementById('searchCount');
  if (query) {
    sc.textContent = total + ' resultado' + (total !== 1 ? 's' : '');
    sc.style.opacity = '1';
  } else {
    sc.style.opacity = '0';
  }
}

function buildCard(item, idx) {
  const card = document.createElement('div');
  card.className = 'game-card' + (item.isCombo ? ' card-combo' : '');
  card.style.animationDelay = (idx * 0.055) + 's';
  card.onclick = () => openModal(item);

  // Image
  const wrap = document.createElement('div');
  wrap.className = 'card-img-wrap';

  if (item.img) {
    const img = document.createElement('img');
    img.src = item.img;
    img.alt = item.name;
    img.loading = 'lazy';
    img.onerror = function() {
      wrap.innerHTML = fallbackDiv(item) + '<div class="card-overlay"></div><div class="card-shine"></div>';
    };
    wrap.appendChild(img);
    const ov = document.createElement('div'); ov.className = 'card-overlay'; wrap.appendChild(ov);
    const sh = document.createElement('div'); sh.className = 'card-shine';   wrap.appendChild(sh);
  } else {
    wrap.innerHTML = fallbackDiv(item) + '<div class="card-overlay"></div><div class="card-shine"></div>';
  }

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  const badgeHTML = item.badge
    ? `<span class="card-badge badge-${item.badge}">${item.badgeTxt}</span>`
    : '';

  body.innerHTML = `
    <div class="card-name">${esc(item.name)}</div>
    ${item.sub ? `<div class="card-sub">${esc(item.sub)}</div>` : ''}
    <div class="card-footer">
      <div class="card-cta">Ver credenciais
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 6.5h9M8 3l3.5 3.5L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      ${badgeHTML}
    </div>`;

  card.appendChild(wrap);
  card.appendChild(body);
  return card;
}

function fallbackDiv(item) {
  const bgs = {
    combo: 'linear-gradient(135deg,#1a0a22,#28103a)',
    resident: 'linear-gradient(135deg,#1a0808,#2a1010)',
    outros: 'linear-gradient(135deg,#080a1e,#101630)',
  };
  return `<div class="card-img-fallback" style="background:${bgs[item.group]||bgs.outros}">${item.emoji}</div>`;
}

// ——— MODAL ———
function openModal(item) {
  // Hero
  const hero = document.getElementById('mHero');
  if (item.img) {
    hero.innerHTML = `
      <img src="${esc(item.img)}" alt="${esc(item.name)}"
        onerror="this.parentElement.innerHTML='<div class=\\'modal-hero-fallback\\' style=\\'background:linear-gradient(135deg,#0d0d1a,#181830)\\'>${item.emoji}</div><div class=\\'modal-hero-overlay\\'></div>'">
      <div class="modal-hero-overlay"></div>`;
  } else {
    const bgs = { combo:'linear-gradient(135deg,#1a0a22,#28103a)', resident:'linear-gradient(135deg,#1a0808,#2a1010)', outros:'linear-gradient(135deg,#080a1e,#101630)' };
    hero.innerHTML = `<div class="modal-hero-fallback" style="background:${bgs[item.group]||bgs.outros}">${item.emoji}</div><div class="modal-hero-overlay"></div>`;
  }

  const eyebrow = item.isCombo ? 'Mega Combo' : (item.games && item.games.length > 1 ? 'Coleção' : 'Jogo');

  let html = `
    <div class="modal-eyebrow">${eyebrow}</div>
    <div class="modal-title">${esc(item.name)}</div>
    ${item.sub ? `<div class="modal-desc">${esc(item.sub)}</div>` : '<div style="margin-bottom:18px"></div>'}
  `;

  if (item.games && item.games.length > 0) {
    html += `
      <div class="games-list">
        <div class="games-list-header">Jogos inclusos <span>${item.games.length}</span></div>
        ${item.games.map(g => `<div class="games-list-item">${esc(g)}</div>`).join('')}
      </div>`;
  }

  html += `<div class="cred-section-title">Credenciais de Acesso</div>`;
  html += credBlock([{l:'Usuário', v:item.creds.user},{l:'Senha', v:item.creds.pass}]);

  if (item.extra) {
    html += `<div class="cred-section-title" style="margin-top:14px">${esc(item.extra.label)}</div>`;
    html += credBlock([{l:'E-mail', v:item.extra.email},{l:'Senha', v:item.extra.pass}]);
  }

  if (item.note) {
    html += `<div class="modal-note">${esc(item.note)}</div>`;
  }

  document.getElementById('mContent').innerHTML = html;
  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function credBlock(rows) {
  return `<div class="cred-block">${rows.map(r => `
    <div class="cred-row">
      <div class="cred-label">${r.l}</div>
      <div class="cred-val">${esc(r.v)}</div>
      <button class="cred-copy" onclick="doCopy('${escA(r.v)}',this)" title="Copiar">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="5" y="5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M1 9V2.5A1.5 1.5 0 0 1 2.5 1H9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>`).join('')}</div>`;
}

function closeModal() {
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function bgClick(e) {
  if (e.target === document.getElementById('backdrop')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ——— COPY ———
function doCopy(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('ok');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5 6.5-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    setTimeout(() => {
      btn.classList.remove('ok');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="5" y="5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M1 9V2.5A1.5 1.5 0 0 1 2.5 1H9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;
    }, 2200);
  });
}

// ——— SEARCH / FILTER ———
function doSearch() {
  query = document.getElementById('searchInput').value.trim();
  render();
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ——— HELPERS ———
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escA(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

render();
</script>
